<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message received — CMaestro Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary:    #392668;
      --primary-lg: #9D7FD4;
      --gold:       #C9A84C;
      --gold-bright:#F0C84A;
      --peach:      #FF928C;
      --ink:        #08050F;
      --ink-2:      #100C1C;
      --border:     rgba(120,90,180,0.3);
      --text-1:     #EDE8F5;
      --text-2:     #B8B0CC;
      --text-3:     #8A7FA0;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'Space Grotesk', sans-serif;
      --font-mono:  'Space Mono', monospace;
    }

    html {
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: var(--ink);
      color: var(--text-1);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(201,168,76,0.2);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(201,168,76,0);
      }
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-1);
      margin-bottom: 16px;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .body {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 40px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(201,168,76,0.3);
      margin: 0 auto 40px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 13px 28px;
      background: var(--gold);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn-primary:hover {
      background: var(--gold-bright);
      transform: translateY(-2px);
    }

    .btn-secondary {
      padding: 12px 24px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, color 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn-secondary:hover {
      border-color: rgba(201,168,76,0.4);
      color: var(--gold);
      transform: translateY(-2px);
    }

    .footer-note {
      margin-top: 48px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <p class="eyebrow">// message_received</p>

    <h1>We'll be in<br><em>touch soon.</em></h1>

    <p class="body">Thanks for reaching out to CMaestro Studio. We've received your message and will get back to you within 1–2 business days.</p>

    <div class="divider"></div>

    <div class="actions">
      <a href="/" class="btn-primary">Back to home →</a>
      <a href="/products/" class="btn-secondary">Explore products</a>
    </div>

    <p class="footer-note">// CMaestro Studio · cmaestrostudio.xyz</p>

  </div>

</body>
</html>
